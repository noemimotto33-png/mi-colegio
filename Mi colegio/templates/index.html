<<!DOCTYPE html>
<html>
<head>
    <title>Colegio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h1>📚 Sistema del Colegio</h1>
        <a href="/logout" class="btn btn-danger">Cerrar sesión</a>
    </div>

    <hr>

    <!-- FORMULARIO -->
    <div class="card p-3 mb-4">
        <h4>Añadir estudiante</h4>

        <form action="/add" method="post" class="row g-2">

            <div class="col-md-4">
                <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
            </div>

            <div class="col-md-3">
                <input type="text" name="curso" class="form-control" placeholder="Curso" required>
            </div>

            <div class="col-md-3">
                <select name="pago" class="form-control">
                    <option value="Pagado">Pagado</option>
                    <option value="Pendiente">Pendiente</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Guardar</button>
            </div>

        </form>
    </div>

    <!-- FILTROS -->
    <div class="mb-3">
        <a href="/filtro/Pagado" class="btn btn-success">Pagados</a>
        <a href="/filtro/Pendiente" class="btn btn-warning">Pendientes</a>
    </div>

    <!-- ESTUDIANTES -->
    {% for curso, lista in cursos.items() %}

        <div class="card mb-3 p-3">
            <h3>📘 {{ curso }}</h3>

            <ul class="list-group">

                {% for estudiante in lista %}

                    <li class="list-group-item d-flex justify-content-between align-items-center">

                        <div>
                            <b>{{ estudiante[1] }}</b> |
                            {{ estudiante[3] }}
                        </div>

                        <div>
                            <a href="/editar/{{ estudiante[0] }}" class="btn btn-sm btn-info">Editar</a>
                            <a href="/eliminar/{{ estudiante[0] }}" class="btn btn-sm btn-danger">Eliminar</a>
                        </div>

                    </li>

                {% endfor %}

            </ul>
        </div>

    {% endfor %}

</div>

</body>
</html>
